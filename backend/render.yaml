services:
  - type: web
    name: psdeals-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ROADRUNNER_EMAIL
        sync: false
      - key: ROADRUNNER_PASSWORD
        sync: false
      - key: PUSHOVER_API_TOKEN
        sync: false